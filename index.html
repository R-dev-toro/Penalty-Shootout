<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penalty Shootout ⚽</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --grass-mid: #1a472a;
    --grass-dark: #0d2e18;
    --post: #f0f4f8;
    --net: rgba(255,255,255,0.13);
    --accent: #d4ff00;
    --danger: #ff4444;
    --sky: #0a0f1e;
    --text: #fff9e6;
    --home: #d4ff00;
    --away: #88aaff;
  }

  body {
    background: var(--sky);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow-x: hidden; user-select: none;
    padding: 12px 0;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 5%,  rgba(255,255,255,0.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.65) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 8%,  rgba(255,255,255,0.4)  0%, transparent 100%),
      radial-gradient(1px 1px at 90% 25%, rgba(255,255,255,0.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 3%,  rgba(255,255,255,0.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 30%, rgba(255,255,255,0.3)  0%, transparent 100%),
      radial-gradient(1px 1px at 70% 12%, rgba(255,255,255,0.5)  0%, transparent 100%);
    pointer-events: none; z-index: 0;
  }

  .screen { display: none; flex-direction: column; align-items: center; z-index: 1; width: 100%; max-width: 600px; padding: 16px; }
  .screen.active { display: flex; }

  /* ── SETUP ── */
  #setupScreen { gap: 22px; text-align: center; }
  .menu-title { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 6px; line-height: 0.95; }
  .menu-title span { color: var(--accent); }
  .setup-block { width: 100%; }
  .setup-label { font-size: 11px; font-weight: 700; letter-spacing: 3px; opacity: 0.5; text-transform: uppercase; margin-bottom: 10px; }

  .opt-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .opt { background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 12px 18px; cursor: pointer; transition: all 0.18s; min-width: 90px; }
  .opt:hover { border-color: rgba(255,255,255,0.4); }
  .opt.selected { border-color: var(--accent); background: rgba(212,255,0,0.1); }
  .opt .o-icon { font-size: 24px; margin-bottom: 4px; }
  .opt .o-label { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; }
  .opt .o-desc { font-size: 10px; opacity: 0.5; margin-top: 2px; }

  .team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  @media (max-width: 480px){ .team-grid { grid-template-columns: repeat(3, 1fr); } }
  .team-card { background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 6px; cursor: pointer; transition: all 0.18s; text-align: center; }
  .team-card:hover { border-color: rgba(255,255,255,0.4); transform: translateY(-2px); }
  .team-card.selected { border-color: var(--sel, var(--accent)); background: rgba(255,255,255,0.07); box-shadow: 0 0 0 1px var(--sel, var(--accent)); }
  .badge { width: 38px; height: 44px; margin: 0 auto 6px; border-radius: 4px 4px 8px 8px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: #fff; position: relative; overflow: hidden; border: 1.5px solid rgba(255,255,255,0.3); }
  .team-card .tname { font-size: 10px; font-weight: 600; line-height: 1.2; }

  .btn { border: none; padding: 13px 36px; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 22px rgba(212,255,0,0.4); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); border: 1.5px solid rgba(255,255,255,0.2); }
  .btn-secondary:hover { transform: scale(1.05); }

  /* ── GAME ── */
  .top-bar { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 10px; }
  .phase-badge { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }
  .phase-badge.you { color: var(--home); opacity: 1; }
  .phase-badge.cpu { color: var(--away); opacity: 1; }
  .diff-tag { font-size: 10px; letter-spacing: 1px; opacity: 0.4; text-transform: uppercase; }

  .scoreboard { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 8px; }
  .team-score { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .mini-badge { width: 26px; height: 30px; border-radius: 3px 3px 6px 6px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 12px; color:#fff; border: 1px solid rgba(255,255,255,0.3); }
  .team-name { font-size: 10px; font-weight: 700; letter-spacing: 2px; opacity: 0.6; text-transform: uppercase; }
  .score-num { font-family: 'Bebas Neue', sans-serif; font-size: 44px; line-height: 1; }
  #playerScore { color: var(--home); }
  #cpuScore { color: var(--away); }
  .score-divider { font-family: 'Bebas Neue'; font-size: 30px; opacity: 0.25; }

  .dots-wrap { width: 100%; margin-bottom: 12px; }
  .dots-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .dots-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; opacity: 0.5; width: 80px; flex-shrink: 0; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pk-dots { display: flex; gap: 5px; }
  .pk-dot { width: 13px; height: 13px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25); transition: all 0.3s; }
  .pk-dot.scored { background: var(--accent); border-color: var(--accent); }
  .pk-dot.missed { background: var(--danger); border-color: var(--danger); }
  .pk-dot.current { border-color: white; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.35);} 50% { box-shadow: 0 0 0 5px rgba(255,255,255,0);} }

  .stadium { position: relative; width: 100%; aspect-ratio: 4/3; max-height: 360px; border-radius: 12px; overflow: hidden; box-shadow: 0 0 80px rgba(212,255,0,0.07), 0 20px 60px rgba(0,0,0,0.6); }
  .grass { position: absolute; inset: 0; background: linear-gradient(to bottom, var(--grass-mid) 0%, var(--grass-dark) 100%); }
  .grass-stripes { position: absolute; inset: 0; background-image: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.07) 40px, rgba(0,0,0,0.07) 80px); }
  .spotlight-glow { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); width: 300%; height: 200%; background: radial-gradient(ellipse at 50% 0%, rgba(255,249,230,0.1) 0%, transparent 60%); pointer-events: none; }

  .goal { position: absolute; top: 7%; left: 50%; transform: translateX(-50%); width: 72%; height: 54%; }
  .goal-frame { position: absolute; inset: 0; border: 5px solid var(--post); border-bottom: none; box-shadow: 0 0 16px rgba(255,255,255,0.25); }
  .goal-net { position: absolute; inset: 0; background-image: repeating-linear-gradient(0deg, var(--net) 0px, var(--net) 1px, transparent 1px, transparent 18px), repeating-linear-gradient(90deg, var(--net) 0px, var(--net) 1px, transparent 1px, transparent 18px); }

  /* 3x3 zone grid */
  .goal-zones { position: absolute; inset: 5px; display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); gap: 3px; z-index: 10; }
  .zone { border-radius: 4px; cursor: pointer; transition: background 0.12s; position: relative; }
  .zone:hover.shootable { background: rgba(212,255,0,0.22); }
  .zone:hover.diveable  { background: rgba(136,170,255,0.22); }
  .zone.disabled { pointer-events: none; }
  .zone-flash { position: absolute; inset: 0; border-radius: 4px; pointer-events: none; opacity: 0; }
  .zone-flash.g { background: rgba(212,255,0,0.55); animation: flash 0.55s forwards; }
  .zone-flash.m { background: rgba(255,68,68,0.55);  animation: flash 0.55s forwards; }
  @keyframes flash { 0% { opacity:1;} 100% { opacity:0;} }
  /* keeper-covered hint cells (shown briefly) */
  .zone.covered::after { content:''; position:absolute; inset:0; border-radius:4px; background: rgba(136,170,255,0.28); animation: flash 0.55s forwards; pointer-events:none; }

  .penalty-area { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 55%; height: 26%; border: 3px solid rgba(255,255,255,0.18); border-bottom: none; }
  .penalty-spot { position: absolute; bottom: 33%; left: 50%; transform: translateX(-50%); width: 9px; height: 9px; background: rgba(255,255,255,0.45); border-radius: 50%; }

  .keeper { position: absolute; bottom: 56%; left: 50%; transform: translateX(-50%); font-size: 36px; transition: transform 0.25s cubic-bezier(0.25,1.5,0.5,1); z-index: 5; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
  /* keeper dive positions: 9 spots */
  .keeper.k-tl { transform: translate(calc(-50% - 78px), -48px) rotate(-30deg); }
  .keeper.k-tc { transform: translate(-50%,              -54px) scale(1.05); }
  .keeper.k-tr { transform: translate(calc(-50% + 78px), -48px) rotate(30deg); }
  .keeper.k-ml { transform: translate(calc(-50% - 76px),   0px) rotate(-22deg); }
  .keeper.k-mc { transform: translate(-50%,                0px); }
  .keeper.k-mr { transform: translate(calc(-50% + 76px),   0px) rotate(22deg); }
  .keeper.k-bl { transform: translate(calc(-50% - 70px),  30px) rotate(-14deg); }
  .keeper.k-bc { transform: translate(-50%,               24px); }
  .keeper.k-br { transform: translate(calc(-50% + 70px),  30px) rotate(14deg); }

  .shooter { position: absolute; bottom: 18%; left: 50%; transform: translateX(-50%); font-size: 32px; z-index: 5; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); transition: transform 0.3s ease; }
  .shooter.kick-anim { transform: translateX(-50%) scale(1.2); }

  .ball { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); font-size: 25px; transition: all 0.5s cubic-bezier(0.25,0.1,0.25,1); z-index: 6; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)); }
  /* 9 fly destinations (matching goal zone centers) */
  .ball.fly-tl { transform: translate(calc(-50% - 92px), -188px) scale(0.5); }
  .ball.fly-tc { transform: translate(-50%,              -196px) scale(0.5); }
  .ball.fly-tr { transform: translate(calc(-50% + 92px), -188px) scale(0.5); }
  .ball.fly-ml { transform: translate(calc(-50% - 88px), -150px) scale(0.55); }
  .ball.fly-mc { transform: translate(-50%,              -156px) scale(0.55); }
  .ball.fly-mr { transform: translate(calc(-50% + 88px), -150px) scale(0.55); }
  .ball.fly-bl { transform: translate(calc(-50% - 82px), -112px) scale(0.62); }
  .ball.fly-bc { transform: translate(-50%,              -118px) scale(0.62); }
  .ball.fly-br { transform: translate(calc(-50% + 82px), -112px) scale(0.62); }

  .result-pop { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 20; pointer-events: none; opacity: 0; }
  .result-pop.show { animation: popIn 1.9s forwards; }
  .result-text { font-family: 'Bebas Neue', sans-serif; font-size: 58px; letter-spacing: 5px; padding: 10px 28px; border-radius: 8px; text-shadow: 0 0 28px currentColor; }
  .result-text.goal { color: var(--accent); background: rgba(0,0,0,0.6); }
  .result-text.miss { color: var(--danger); background: rgba(0,0,0,0.6); }
  @keyframes popIn { 0%{opacity:0;transform:scale(0.5);} 18%{opacity:1;transform:scale(1.1);} 35%{transform:scale(1);} 70%{opacity:1;} 100%{opacity:0;transform:scale(1);} }

  .controls { margin-top: 14px; text-align: center; min-height: 48px; }
  .msg { font-size: 14px; font-weight: 600; opacity: 0.85; margin-bottom: 4px; }
  .sub-msg { font-size: 11px; opacity: 0.4; letter-spacing: 1px; }

  #gameOverScreen { gap: 16px; text-align: center; }
  .go-title { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 4px; line-height: 1; }
  .go-score { font-family: 'Bebas Neue', sans-serif; font-size: 34px; }
  .go-score .h { color: var(--home); } .go-score .a { color: var(--away); }
  .go-sub { font-size: 13px; opacity: 0.5; }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div class="screen active" id="setupScreen">
  <div class="menu-title">PENALTY<br><span>SHOOTOUT</span></div>

  <div class="setup-block">
    <div class="setup-label">Difficulty <span style="opacity:0.6;font-weight:400">— CPU keeper skill</span></div>
    <div class="opt-row" id="diffOpts">
      <div class="opt selected" data-diff="easy"><div class="o-label">Easy</div><div class="o-desc">Weak keeper</div></div>
      <div class="opt" data-diff="normal"><div class="o-label">Normal</div><div class="o-desc">Sometimes reads</div></div>
      <div class="opt" data-diff="hard"><div class="o-label">Hard</div><div class="o-desc">Wide + reads</div></div>
      <div class="opt" data-diff="legend"><div class="o-label">Legend</div><div class="o-desc">Brutal</div></div>
    </div>
  </div>

  <div class="setup-block">
    <div class="setup-label">Your Team — <span id="yourTeamName" style="color:var(--accent)">Pick one</span></div>
    <div class="team-grid" id="homeGrid"></div>
  </div>

  <div class="setup-block">
    <div class="setup-label">Opponent — <span id="oppTeamName" style="color:#88aaff">Pick one</span></div>
    <div class="team-grid" id="awayGrid"></div>
  </div>

  <button class="btn btn-primary" id="btnStart" disabled>Kick Off ▶</button>
</div>

<!-- ══ GAME ══ -->
<div class="screen" id="gameScreen">
  <div class="top-bar">
    <div class="phase-badge" id="phaseBadge">YOUR KICK</div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="diff-tag" id="diffTag">Easy</div>
      <div style="font-size:11px;opacity:0.35;" id="roundLabel">ROUND 1 / 5</div>
    </div>
  </div>

  <div class="scoreboard">
    <div class="team-score"><div class="mini-badge" id="homeMini">H</div><div class="team-name" id="homeName">YOU</div><div class="score-num" id="playerScore">0</div></div>
    <div class="score-divider">—</div>
    <div class="team-score"><div class="mini-badge" id="awayMini">A</div><div class="team-name" id="awayName">CPU</div><div class="score-num" id="cpuScore">0</div></div>
  </div>

  <div class="dots-wrap">
    <div class="dots-row"><div class="dots-label" id="dotsLabelYou">YOU</div><div class="pk-dots" id="dotsYou"></div></div>
    <div class="dots-row"><div class="dots-label" id="dotsLabelCpu">CPU</div><div class="pk-dots" id="dotsCpu"></div></div>
  </div>

  <div class="stadium">
    <div class="grass"><div class="grass-stripes"></div></div>
    <div class="spotlight-glow"></div>
    <div class="goal">
      <div class="goal-frame"></div>
      <div class="goal-net"></div>
      <div class="goal-zones" id="goalZones">
        <div class="zone" data-pos="tl"><div class="zone-flash" id="f-tl"></div></div>
        <div class="zone" data-pos="tc"><div class="zone-flash" id="f-tc"></div></div>
        <div class="zone" data-pos="tr"><div class="zone-flash" id="f-tr"></div></div>
        <div class="zone" data-pos="ml"><div class="zone-flash" id="f-ml"></div></div>
        <div class="zone" data-pos="mc"><div class="zone-flash" id="f-mc"></div></div>
        <div class="zone" data-pos="mr"><div class="zone-flash" id="f-mr"></div></div>
        <div class="zone" data-pos="bl"><div class="zone-flash" id="f-bl"></div></div>
        <div class="zone" data-pos="bc"><div class="zone-flash" id="f-bc"></div></div>
        <div class="zone" data-pos="br"><div class="zone-flash" id="f-br"></div></div>
      </div>
    </div>
    <div class="penalty-area"></div>
    <div class="penalty-spot"></div>
    <div class="keeper" id="keeper">🧤</div>
    <div class="shooter" id="shooter" style="display:none">🏃</div>
    <div class="ball" id="ball">⚽</div>
    <div class="result-pop" id="resultPop"><div class="result-text" id="resultText"></div></div>
  </div>

  <div class="controls">
    <div class="msg" id="msg">Pick a zone to shoot</div>
    <div class="sub-msg" id="subMsg">Click any of the 9 cells ↑</div>
  </div>
</div>

<!-- ══ GAME OVER ══ -->
<div class="screen" id="gameOverScreen">
  <div class="go-title" id="goTitle">FULL TIME</div>
  <div class="go-score" id="goScore"></div>
  <div class="go-sub" id="goSub"></div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btnPlayAgain">Rematch</button>
    <button class="btn btn-secondary" id="btnSetup">Change Setup</button>
  </div>
</div>

<script>
const TOTAL = 5;
const ROWS = ['t','m','b'], COLS = ['l','c','r'];
const ZONES = [];
ROWS.forEach(r => COLS.forEach(c => ZONES.push(r+c)));
const CORNERS = ['tl','tr','bl','br'];

/* ── neighbor helpers for keeper cover ── */
function cell(z){ return { r: ROWS.indexOf(z[0]), c: COLS.indexOf(z[1]) }; }
function zoneAt(r,c){ return (r>=0&&r<3&&c>=0&&c<3) ? ROWS[r]+COLS[c] : null; }
function coverSingle(z){ return new Set([z]); }
function coverHoriz(z){ const {r,c}=cell(z); const s=new Set([z]); [-1,1].forEach(d=>{const x=zoneAt(r,c+d); if(x)s.add(x);}); return s; }
function coverCross(z){ const {r,c}=cell(z); const s=new Set([z]); [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{const x=zoneAt(r+dr,c+dc); if(x)s.add(x);}); return s; }

/* ── difficulty: keeper cover shape + chance to read shooter's exact cell ── */
const DIFFICULTY = {
  easy:   { cover:'single', read:0.00, label:'Easy'   },
  normal: { cover:'single', read:0.15, label:'Normal' },
  hard:   { cover:'horiz',  read:0.30, label:'Hard'   },
  legend: { cover:'cross',  read:0.50, label:'Legend' },
};
function coverSetFor(shape, keeperZone){
  if (shape==='single') return coverSingle(keeperZone);
  if (shape==='horiz')  return coverHoriz(keeperZone);
  return coverCross(keeperZone);
}

const TEAMS = [
  { id:'psg', name:'Paris SG',    code:'PSG', c1:'#004170', c2:'#da291c' },
  { id:'ars', name:'Arsenal',     code:'ARS', c1:'#ef0107', c2:'#ffffff' },
  { id:'rma', name:'Real Madrid', code:'RMA', c1:'#ffffff', c2:'#febe10' },
  { id:'bar', name:'Barcelona',   code:'BAR', c1:'#a50044', c2:'#004d98' },
  { id:'bay', name:'Bayern',      code:'BAY', c1:'#dc052d', c2:'#0066b2' },
  { id:'liv', name:'Liverpool',   code:'LIV', c1:'#c8102e', c2:'#00b2a9' },
  { id:'mci', name:'Man City',    code:'MCI', c1:'#6cabdd', c2:'#1c2c5b' },
  { id:'int', name:'Inter',       code:'INT', c1:'#0b1560', c2:'#000000' },
  { id:'che', name:'Chelsea',     code:'CHE', c1:'#034694', c2:'#ffffff' },
  { id:'juv', name:'Juventus',    code:'JUV', c1:'#000000', c2:'#ffffff' },
  { id:'mun', name:'Man United',  code:'MUN', c1:'#da291c', c2:'#fbe122' },
  { id:'dor', name:'Dortmund',    code:'DOR', c1:'#fde100', c2:'#000000' },
];

let cfg = { diff:'easy', home:null, away:null };
let state = {};

/* ── badge ── */
function badgeStyle(t){ return `background:linear-gradient(135deg, ${t.c1} 0%, ${t.c1} 55%, ${t.c2} 55%, ${t.c2} 100%);`; }
function textColorFor(hex){ const c=hex.replace('#',''); const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16); return (r*299+g*587+b*114)/1000>150?'#111':'#fff'; }

/* ── setup ── */
function buildTeamGrids(){
  ['homeGrid','awayGrid'].forEach(gridId=>{
    const grid=document.getElementById(gridId); grid.innerHTML='';
    const side=gridId==='homeGrid'?'home':'away';
    TEAMS.forEach(team=>{
      const card=document.createElement('div'); card.className='team-card';
      card.style.setProperty('--sel', side==='home'?team.c1:team.c2);
      card.innerHTML=`<div class="badge" style="${badgeStyle(team)};color:${textColorFor(team.c1)}">${team.code}</div><div class="tname">${team.name}</div>`;
      card.onclick=()=>selectTeam(side,team,card);
      grid.appendChild(card);
    });
  });
}
function selectTeam(side,team,card){
  const gridId=side==='home'?'homeGrid':'awayGrid';
  document.querySelectorAll('#'+gridId+' .team-card').forEach(c=>c.classList.remove('selected'));
  card.classList.add('selected'); cfg[side]=team;
  document.getElementById(side==='home'?'yourTeamName':'oppTeamName').textContent=team.name;
  document.getElementById('btnStart').disabled=!(cfg.home&&cfg.away);
}
document.querySelectorAll('#diffOpts .opt').forEach(o=>o.onclick=()=>{ document.querySelectorAll('#diffOpts .opt').forEach(x=>x.classList.remove('selected')); o.classList.add('selected'); cfg.diff=o.dataset.diff; });
document.getElementById('btnStart').onclick=startGame;
document.getElementById('btnPlayAgain').onclick=startGame;
document.getElementById('btnSetup').onclick=()=>{ hide('gameOverScreen'); show('setupScreen'); };

function show(id){ document.getElementById(id).classList.add('active'); }
function hide(id){ document.getElementById(id).classList.remove('active'); }
function rnd(a){ return a[Math.floor(Math.random()*a.length)]; }
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ── keeper decides which cell to dive to, vs a known shot ── */
function keeperPick(shotZone){
  const d = DIFFICULTY[cfg.diff];
  if (Math.random() < d.read) return shotZone;   // reads exact cell
  return rnd(ZONES);                             // random guess
}
function isSaved(shotZone, keeperZone){
  return coverSetFor(DIFFICULTY[cfg.diff].cover, keeperZone).has(shotZone);
}

/* ── start ── */
function startGame(){
  state={ round:1, youScore:0, cpuScore:0, youHistory:[], cpuHistory:[], busy:false };
  document.documentElement.style.setProperty('--home', cfg.home.c1==='#ffffff'?'#e8e8e8':cfg.home.c1);
  document.documentElement.style.setProperty('--away', cfg.away.c2==='#ffffff'?cfg.away.c1:cfg.away.c2);
  const hm=document.getElementById('homeMini'), am=document.getElementById('awayMini');
  hm.style.cssText=badgeStyle(cfg.home)+`color:${textColorFor(cfg.home.c1)}`; hm.textContent=cfg.home.code;
  am.style.cssText=badgeStyle(cfg.away)+`color:${textColorFor(cfg.away.c1)}`; am.textContent=cfg.away.code;
  document.getElementById('homeName').textContent=cfg.home.name;
  document.getElementById('awayName').textContent=cfg.away.name;
  document.getElementById('dotsLabelYou').textContent=cfg.home.name;
  document.getElementById('dotsLabelCpu').textContent=cfg.away.name;
  document.getElementById('diffTag').textContent=DIFFICULTY[cfg.diff].label;
  hide('setupScreen'); hide('gameOverScreen'); show('gameScreen');
  resetVisuals(); updateUI(); beginRound();
}

function resetVisuals(){
  document.getElementById('keeper').className='keeper';
  document.getElementById('ball').className='ball';
  document.getElementById('shooter').style.display='none';
  document.getElementById('resultPop').className='result-pop';
  document.querySelectorAll('.zone').forEach(z=>z.classList.remove('covered'));
  disableZones();
}
function updateUI(){
  document.getElementById('playerScore').textContent=state.youScore;
  document.getElementById('cpuScore').textContent=state.cpuScore;
  document.getElementById('roundLabel').textContent=`ROUND ${Math.min(state.round,TOTAL)} / ${TOTAL}`;
  renderDots('dotsYou',state.youHistory); renderDots('dotsCpu',state.cpuHistory);
}
function renderDots(id,h){
  const c=document.getElementById(id); c.innerHTML='';
  for(let i=0;i<TOTAL;i++){ const d=document.createElement('div'); d.className='pk-dot';
    if(i<h.length) d.classList.add(h[i]?'scored':'missed');
    else if(i===h.length&&state.round<=TOTAL) d.classList.add('current');
    c.appendChild(d); }
}

/* ── round flow ── */
async function beginRound(){
  if(state.round>TOTAL){ showGameOver(); return; }
  updateUI();
  await youShoot();          // you shoot, CPU keeper tries to save
  await wait(400); resetVisuals();
  await youSave();           // CPU shoots, you pick where to dive
  state.round++; await wait(300); resetVisuals();
  beginRound();
}

/* YOU shoot — CPU keeper skill from difficulty */
async function youShoot(){
  setPhase('YOUR KICK','you');
  setMsg('Pick a zone to shoot','Click any of the 9 cells ↑');
  enableZones('shootable');
  return new Promise(resolve=>{
    document.querySelectorAll('.zone').forEach(z=>z.onclick=async()=>{
      if(state.busy) return; state.busy=true; disableZones();
      const shot=z.dataset.pos;
      const keeperZone=keeperPick(shot);
      const saved=isSaved(shot,keeperZone);
      const scored=!saved;
      state.youHistory.push(scored); if(scored) state.youScore++;
      updateUI();
      await animateShot(shot, keeperZone, scored, scored?'GOAL!':'SAVED!',
        scored?'⚽ You scored!':'🧤 Keeper saved it!');
      state.busy=false; resolve();
    });
  });
}

/* YOU save — CPU shoots, you pick a dive cell. Cover = picked cell + adjacent (cross, 5 cells) */
async function youSave(){
  setPhase('YOUR SAVE','cpu');
  setMsg(cfg.away.name+' is shooting — pick your dive!','Your cell + neighbours are covered ↑');
  enableZones('diveable');
  const cpuShot=rnd(ZONES);
  return new Promise(resolve=>{
    document.querySelectorAll('.zone').forEach(z=>z.onclick=async()=>{
      if(state.busy) return; state.busy=true; disableZones();
      const diveZone=z.dataset.pos;
      const cover=coverCross(diveZone);   // always cross: picked + adjacent neighbours
      const saved=cover.has(cpuShot);
      const cpuScored=!saved;
      state.cpuHistory.push(cpuScored); if(cpuScored) state.cpuScore++;
      updateUI();
      cover.forEach(cz=>{ if(cz!==diveZone) document.querySelector(`.zone[data-pos="${cz}"]`).classList.add('covered'); });
      const sh=document.getElementById('shooter'); sh.style.display='block';
      sh.classList.add('kick-anim'); await wait(260); sh.classList.remove('kick-anim');
      await animateShot(cpuShot, diveZone, cpuScored, cpuScored?'GOAL!':'SAVED!',
        cpuScored?('😬 '+cfg.away.name+' scored!'):'🧤 Great save!');
      sh.style.display='none';
      state.busy=false; resolve();
    });
  });
}

/* ── animation ── */
async function animateShot(shotZone, keeperZone, scored, label, bottomMsg){
  const keeper=document.getElementById('keeper'), ball=document.getElementById('ball');
  keeper.classList.add('k-'+keeperZone);
  ball.classList.add('fly-'+shotZone);
  const flash=document.getElementById('f-'+shotZone);
  flash.className='zone-flash '+(scored?'g':'m');
  setTimeout(()=>flash.className='zone-flash',600);
  await wait(330);
  const pop=document.getElementById('resultPop'), rt=document.getElementById('resultText');
  pop.className='result-pop'; rt.className='result-text '+(label==='GOAL!'?'goal':'miss');
  rt.textContent=label; pop.classList.add('show');
  setMsg(bottomMsg,'');
  await wait(1900);
}

/* ── helpers ── */
function enableZones(cls){ document.querySelectorAll('.zone').forEach(z=>{z.classList.remove('disabled');z.classList.add(cls);}); }
function disableZones(){ document.querySelectorAll('.zone').forEach(z=>{z.className='zone disabled';z.onclick=null;}); }
function setPhase(t,c){ const b=document.getElementById('phaseBadge'); b.textContent=t; b.className='phase-badge '+c; }
function setMsg(m,s){ document.getElementById('msg').textContent=m; document.getElementById('subMsg').textContent=s; }

/* ── game over ── */
function showGameOver(){
  const y=state.youScore,c=state.cpuScore; let title,sub;
  if(y>c){ title=cfg.home.name+' WIN! 🏆'; sub='Champions of the shootout!'; }
  else if(y<c){ title=cfg.away.name+' WIN'; sub='Heartbreak from the spot.'; }
  else { title='DRAW'; sub='Down to the wire!'; }
  document.getElementById('goTitle').textContent=title;
  document.getElementById('goScore').innerHTML=`<span class="h">${y}</span> — <span class="a">${c}</span>`;
  document.getElementById('goSub').textContent=sub;
  hide('gameScreen'); show('gameOverScreen');
}

buildTeamGrids();
</script>
