<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penalty Shootout ⚽</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --grass-dark: #0d2e18;
    --grass-mid: #1a472a;
    --post: #f0f4f8;
    --net: rgba(255,255,255,0.13);
    --accent: #d4ff00;
    --danger: #ff4444;
    --sky: #0a0f1e;
    --text: #fff9e6;
  }

  body {
    background: var(--sky);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 5%,  rgba(255,255,255,0.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.65) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 8%,  rgba(255,255,255,0.4)  0%, transparent 100%),
      radial-gradient(1px 1px at 90% 25%, rgba(255,255,255,0.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 3%,  rgba(255,255,255,0.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 30%, rgba(255,255,255,0.3)  0%, transparent 100%),
      radial-gradient(1px 1px at 70% 12%, rgba(255,255,255,0.5)  0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; align-items: center; z-index: 1; width: 100%; max-width: 580px; padding: 16px; }
  .screen.active { display: flex; }

  /* ── MENU ── */
  #menuScreen { gap: 28px; text-align: center; }
  .menu-title { font-family: 'Bebas Neue', sans-serif; font-size: 64px; letter-spacing: 6px; line-height: 1; }
  .menu-title span { color: var(--accent); }
  .menu-sub { font-size: 13px; opacity: 0.45; letter-spacing: 3px; text-transform: uppercase; }
  .mode-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .mode-card {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 28px 32px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    width: 200px;
    text-align: center;
  }
  .mode-card:hover { border-color: var(--accent); background: rgba(212,255,0,0.07); transform: translateY(-3px); }
  .mode-card .icon { font-size: 40px; margin-bottom: 10px; }
  .mode-card .label { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; }
  .mode-card .desc { font-size: 12px; opacity: 0.5; margin-top: 6px; line-height: 1.5; }

  /* ── GAME ── */
  #gameScreen { gap: 0; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 10px;
  }
  .phase-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.5;
  }
  .phase-badge.you  { color: var(--accent); opacity: 1; }
  .phase-badge.cpu  { color: #88aaff; opacity: 1; }

  .scoreboard {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 8px;
    font-family: 'Bebas Neue', sans-serif;
  }
  .team-score { text-align: center; }
  .team-name { font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 3px; opacity: 0.5; text-transform: uppercase; }
  .score-num { font-size: 48px; line-height: 1; color: var(--accent); }
  .score-divider { font-size: 32px; opacity: 0.25; }

  /* dual dot rows */
  .dots-wrap { width: 100%; margin-bottom: 12px; }
  .dots-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .dots-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; opacity: 0.4; text-transform: uppercase; width: 36px; flex-shrink: 0; }
  .pk-dots { display: flex; gap: 5px; }
  .pk-dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    transition: all 0.3s;
  }
  .pk-dot.scored { background: var(--accent); border-color: var(--accent); }
  .pk-dot.missed { background: var(--danger); border-color: var(--danger); }
  .pk-dot.current { border-color: white; animation: pulse 1s infinite; }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.35); }
    50%      { box-shadow: 0 0 0 5px rgba(255,255,255,0); }
  }

  /* ── STADIUM ── */
  .stadium {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    max-height: 360px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(212,255,0,0.07), 0 20px 60px rgba(0,0,0,0.6);
  }
  .grass {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, var(--grass-mid) 0%, var(--grass-dark) 100%);
  }
  .grass-stripes {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(90deg,
      transparent, transparent 40px,
      rgba(0,0,0,0.07) 40px, rgba(0,0,0,0.07) 80px);
  }
  .spotlight-glow {
    position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
    width: 300%; height: 200%;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,249,230,0.1) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Goal */
  .goal {
    position: absolute; top: 8%; left: 50%; transform: translateX(-50%);
    width: 70%; height: 52%;
  }
  .goal-frame {
    position: absolute; inset: 0;
    border: 5px solid var(--post); border-bottom: none;
    box-shadow: 0 0 16px rgba(255,255,255,0.25);
  }
  .goal-net {
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg,  var(--net) 0px, var(--net) 1px, transparent 1px, transparent 20px),
      repeating-linear-gradient(90deg, var(--net) 0px, var(--net) 1px, transparent 1px, transparent 20px);
  }

  /* Clickable zones */
  .goal-zones {
    position: absolute; inset: 5px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px; z-index: 10;
  }
  .zone {
    border-radius: 4px; cursor: pointer;
    transition: background 0.15s; position: relative;
  }
  .zone:hover.shootable { background: rgba(212,255,0,0.2); }
  .zone:hover.diveable  { background: rgba(136,170,255,0.2); }
  .zone.disabled { pointer-events: none; }
  .zone-flash { position: absolute; inset: 0; border-radius: 4px; pointer-events: none; opacity: 0; }
  .zone-flash.g { background: rgba(212,255,0,0.55); animation: flash 0.55s forwards; }
  .zone-flash.m { background: rgba(255,68,68,0.55);  animation: flash 0.55s forwards; }
  @keyframes flash { 0% { opacity:1; } 100% { opacity:0; } }

  .penalty-area {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 55%; height: 28%;
    border: 3px solid rgba(255,255,255,0.18); border-bottom: none;
  }
  .penalty-spot {
    position: absolute; bottom: 35%; left: 50%; transform: translateX(-50%);
    width: 9px; height: 9px; background: rgba(255,255,255,0.45); border-radius: 50%;
  }

  /* Keeper */
  .keeper {
    position: absolute; bottom: 55%; left: 50%; transform: translateX(-50%);
    font-size: 38px;
    transition: transform 0.25s cubic-bezier(0.25, 1.5, 0.5, 1);
    z-index: 5;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  }
  .keeper.dive-left  { transform: translateX(calc(-50% - 68px)) rotate(-28deg); }
  .keeper.dive-right { transform: translateX(calc(-50% + 68px)) rotate(28deg); }

  /* Shooter (CPU kicker shown during keeper phase) */
  .shooter {
    position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%);
    font-size: 34px; z-index: 5;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    transition: transform 0.3s ease;
  }
  .shooter.kick-anim { transform: translateX(-50%) scale(1.2); }

  /* Ball */
  .ball {
    position: absolute; bottom: 22%; left: 50%; transform: translateX(-50%);
    font-size: 26px;
    transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
    z-index: 6;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
  }
  .ball.flying-tl { transform: translate(calc(-50% - 90px), -165px) scale(0.54); }
  .ball.flying-tc { transform: translate(-50%,              -170px) scale(0.54); }
  .ball.flying-tr { transform: translate(calc(-50% + 90px), -165px) scale(0.54); }
  .ball.flying-ml { transform: translate(calc(-50% - 85px), -125px) scale(0.6); }
  .ball.flying-mc { transform: translate(-50%,              -130px) scale(0.6); }
  .ball.flying-mr { transform: translate(calc(-50% + 85px), -125px) scale(0.6); }

  /* Result pop */
  .result-pop {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 20; pointer-events: none; opacity: 0;
  }
  .result-pop.show { animation: popIn 1.9s forwards; }
  .result-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 60px; letter-spacing: 5px;
    padding: 10px 28px; border-radius: 8px;
    text-shadow: 0 0 28px currentColor;
  }
  .result-text.goal { color: var(--accent); background: rgba(0,0,0,0.6); }
  .result-text.miss { color: var(--danger); background: rgba(0,0,0,0.6); }
  @keyframes popIn {
    0%   { opacity:0; transform:scale(0.5); }
    18%  { opacity:1; transform:scale(1.1); }
    35%  { transform:scale(1); }
    70%  { opacity:1; }
    100% { opacity:0; transform:scale(1); }
  }

  /* ── CONTROLS ── */
  .controls { margin-top: 14px; text-align: center; min-height: 48px; }
  .msg { font-size: 14px; font-weight: 600; opacity: 0.8; margin-bottom: 4px; }
  .sub-msg { font-size: 11px; opacity: 0.38; letter-spacing: 1px; }

  /* ── GAME OVER ── */
  #gameOverScreen { gap: 18px; text-align: center; }
  .go-title { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 4px; line-height: 1; }
  .go-score { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--accent); }
  .go-sub { font-size: 13px; opacity: 0.5; }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 6px; }
  .btn {
    border: none; padding: 13px 32px; border-radius: 7px;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); border: 1.5px solid rgba(255,255,255,0.2); }
  .btn:hover { transform: scale(1.05); }
  .btn-primary:hover { box-shadow: 0 0 20px rgba(212,255,0,0.4); }
</style>
</head>
<body>

<!-- ══ MENU ══ -->
<div class="screen active" id="menuScreen">
  <div class="menu-title">PENALTY<br><span>SHOOTOUT</span></div>
  <div class="menu-sub">Choose your role</div>
  <div class="mode-cards">
    <div class="mode-card" id="btnShooter">
      <div class="icon">⚽</div>
      <div class="label">Shooter</div>
      <div class="desc">Pick your spot.<br>Beat the keeper.</div>
    </div>
    <div class="mode-card" id="btnKeeper">
      <div class="icon">🧤</div>
      <div class="label">Goalkeeper</div>
      <div class="desc">Read the shot.<br>Make the save.</div>
    </div>
  </div>
</div>

<!-- ══ GAME ══ -->
<div class="screen" id="gameScreen">

  <div class="top-bar">
    <div class="phase-badge" id="phaseBadge">YOUR KICK</div>
    <div style="font-size:11px;opacity:0.35;letter-spacing:1px;" id="roundLabel">ROUND 1 / 5</div>
  </div>

  <div class="scoreboard">
    <div class="team-score">
      <div class="team-name">YOU</div>
      <div class="score-num" id="playerScore">0</div>
    </div>
    <div class="score-divider">—</div>
    <div class="team-score">
      <div class="team-name">CPU</div>
      <div class="score-num" id="cpuScore">0</div>
    </div>
  </div>

  <div class="dots-wrap">
    <div class="dots-row">
      <div class="dots-label">YOU</div>
      <div class="pk-dots" id="dotsYou"></div>
    </div>
    <div class="dots-row">
      <div class="dots-label">CPU</div>
      <div class="pk-dots" id="dotsCpu"></div>
    </div>
  </div>

  <div class="stadium">
    <div class="grass"><div class="grass-stripes"></div></div>
    <div class="spotlight-glow"></div>

    <div class="goal">
      <div class="goal-frame"></div>
      <div class="goal-net"></div>
      <div class="goal-zones" id="goalZones">
        <div class="zone" data-pos="tl"><div class="zone-flash" id="f-tl"></div></div>
        <div class="zone" data-pos="tc"><div class="zone-flash" id="f-tc"></div></div>
        <div class="zone" data-pos="tr"><div class="zone-flash" id="f-tr"></div></div>
        <div class="zone" data-pos="ml"><div class="zone-flash" id="f-ml"></div></div>
        <div class="zone" data-pos="mc"><div class="zone-flash" id="f-mc"></div></div>
        <div class="zone" data-pos="mr"><div class="zone-flash" id="f-mr"></div></div>
      </div>
    </div>

    <div class="penalty-area"></div>
    <div class="penalty-spot"></div>
    <div class="keeper" id="keeper">🧤</div>
    <div class="shooter" id="shooter" style="display:none">🏃</div>
    <div class="ball" id="ball">⚽</div>

    <div class="result-pop" id="resultPop">
      <div class="result-text" id="resultText"></div>
    </div>
  </div>

  <div class="controls">
    <div class="msg" id="msg">Pick a zone to shoot</div>
    <div class="sub-msg" id="subMsg">Click anywhere in the goal ↑</div>
  </div>
</div>

<!-- ══ GAME OVER ══ -->
<div class="screen" id="gameOverScreen">
  <div class="go-title" id="goTitle">FULL TIME</div>
  <div class="go-score" id="goScore">0 — 0</div>
  <div class="go-sub" id="goSub"></div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btnPlayAgain">Play Again</button>
    <button class="btn btn-secondary" id="btnMenu">Menu</button>
  </div>
</div>

<script>
const TOTAL = 5;
const ZONES = ['tl','tc','tr','ml','mc','mr'];
const KEEPER_COVERS = { left:['tl','ml'], center:['tc','mc'], right:['tr','mr'] };
// Which dive direction blocks which column
const DIVE_BLOCKS = { left:['tl','ml'], center:['tc','mc'], right:['tr','mr'] };

let mode = 'shooter'; // 'shooter' | 'keeper'
let state = {};

/* ── helpers ── */
function rnd(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
function show(id)  { document.getElementById(id).classList.add('active'); }
function hide(id)  { document.getElementById(id).classList.remove('active'); }

/* ── screen nav ── */
function goMenu() {
  hide('gameScreen'); hide('gameOverScreen'); show('menuScreen');
}
function goGame() {
  hide('menuScreen'); hide('gameOverScreen'); show('gameScreen');
}
function goOver() {
  hide('gameScreen'); show('gameOverScreen');
}

/* ── init ── */
document.getElementById('btnShooter').onclick = () => { mode='shooter'; startGame(); };
document.getElementById('btnKeeper').onclick  = () => { mode='keeper';  startGame(); };
document.getElementById('btnPlayAgain').onclick = () => startGame();
document.getElementById('btnMenu').onclick      = () => goMenu();

function startGame() {
  state = {
    round: 1,
    youScore: 0,
    cpuScore: 0,
    youHistory: [],   // true=scored, false=missed
    cpuHistory: [],
    busy: false,
  };
  goGame();
  resetVisuals();
  updateUI();
  beginRound();
}

function resetVisuals() {
  document.getElementById('keeper').className = 'keeper';
  document.getElementById('ball').className   = 'ball';
  document.getElementById('shooter').style.display = 'none';
  document.getElementById('resultPop').className = 'result-pop';
  disableZones();
}

function updateUI() {
  document.getElementById('playerScore').textContent = state.youScore;
  document.getElementById('cpuScore').textContent    = state.cpuScore;
  document.getElementById('roundLabel').textContent  = `ROUND ${Math.min(state.round, TOTAL)} / ${TOTAL}`;
  renderDots('dotsYou', state.youHistory);
  renderDots('dotsCpu', state.cpuHistory);
}

function renderDots(id, history) {
  const c = document.getElementById(id);
  c.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'pk-dot';
    if (i < history.length)      d.classList.add(history[i] ? 'scored' : 'missed');
    else if (i === history.length && state.round <= TOTAL) d.classList.add('current');
    c.appendChild(d);
  }
}

/* ── round flow ── */
async function beginRound() {
  if (state.round > TOTAL) { showGameOver(); return; }
  updateUI();
  if (mode === 'shooter') {
    await yourShootPhase();
    await wait(400);
    resetVisuals();
    await cpuShootPhase_asShooter();
  } else {
    await cpuShootPhase_asKeeper();
    await wait(400);
    resetVisuals();
    await yourKeepPhase();
  }
  state.round++;
  await wait(300);
  resetVisuals();
  beginRound();
}

/* ══ SHOOTER MODE ══ */

// YOU shoot, CPU keeps
async function yourShootPhase() {
  setPhaseBadge('YOUR KICK', 'you');
  setMsg('Pick a zone to shoot', 'Click anywhere in the goal ↑');
  enableZonesAs('shootable');

  return new Promise(resolve => {
    document.querySelectorAll('.zone').forEach(z => {
      z.onclick = async () => {
        if (state.busy) return;
        state.busy = true;
        disableZones();
        const pos = z.dataset.pos;
        const dive = rnd(['left','center','right']);
        const saved = DIVE_BLOCKS[dive].includes(pos);
        const scored = !saved;
        state.youHistory.push(scored);
        if (scored) state.youScore++;
        updateUI();
        await animateShot(pos, dive, scored, 'YOU');
        state.busy = false;
        resolve();
      };
    });
  });
}

// CPU shoots, YOU keep (just visual, CPU auto-resolves)
async function cpuShootPhase_asShooter() {
  setPhaseBadge('CPU KICK', 'cpu');
  setMsg('CPU is shooting…', 'Watch the goal!');
  await wait(900);

  const pos  = rnd(ZONES);
  const dive = rnd(['left','center','right']);
  const saved = DIVE_BLOCKS[dive].includes(pos);
  const scored = !saved;
  state.cpuHistory.push(scored);
  if (scored) state.cpuScore++;
  updateUI();

  // Show CPU shooter figure
  const shooter = document.getElementById('shooter');
  shooter.style.display = 'block';
  await wait(150);
  shooter.classList.add('kick-anim');
  await wait(300);
  shooter.classList.remove('kick-anim');

  await animateShot(pos, dive, scored, 'CPU');
  shooter.style.display = 'none';
}

/* ══ KEEPER MODE ══ */

// CPU shoots, YOU keep
async function yourKeepPhase() {
  setPhaseBadge('YOUR SAVE', 'you');
  setMsg('Pick a zone to dive!', 'Click a zone to block ↑');
  enableZonesAs('diveable');

  const cpuPos = rnd(ZONES);

  return new Promise(resolve => {
    document.querySelectorAll('.zone').forEach(z => {
      z.onclick = async () => {
        if (state.busy) return;
        state.busy = true;
        disableZones();
        const divZone = z.dataset.pos;
        // Map zone to dive direction
        const diveDir = ['tl','ml'].includes(divZone) ? 'left'
                      : ['tr','mr'].includes(divZone) ? 'right' : 'center';
        const saved  = DIVE_BLOCKS[diveDir].includes(cpuPos);
        const scored = !saved; // scored = CPU scored
        state.cpuHistory.push(scored);
        if (scored) state.cpuScore++;
        updateUI();

        // show CPU shooter
        const shooter = document.getElementById('shooter');
        shooter.style.display = 'block';
        shooter.classList.add('kick-anim');
        await wait(300);
        shooter.classList.remove('kick-anim');

        await animateShot(cpuPos, diveDir, scored, 'CPU_KEEPER');
        shooter.style.display = 'none';
        state.busy = false;
        resolve();
      };
    });
  });
}

// YOU shoot, CPU keeps (auto)
async function cpuShootPhase_asKeeper() {
  setPhaseBadge('YOUR KICK', 'you');
  setMsg('Shooting…', 'Watching CPU keeper');
  await wait(600);

  const pos  = rnd(ZONES);
  const dive = rnd(['left','center','right']);
  const saved = DIVE_BLOCKS[dive].includes(pos);
  const scored = !saved;
  state.youHistory.push(scored);
  if (scored) state.youScore++;
  updateUI();

  await animateShot(pos, dive, scored, 'YOU_AUTO');
}

/* ── animation ── */
async function animateShot(pos, keeperDive, scored, who) {
  const keeper = document.getElementById('keeper');
  const ball   = document.getElementById('ball');

  // keeper dives
  if (keeperDive === 'left')  keeper.classList.add('dive-left');
  if (keeperDive === 'right') keeper.classList.add('dive-right');

  // ball flies
  ball.classList.add('flying-' + pos);

  // zone flash
  const flash = document.getElementById('f-' + pos);
  flash.className = 'zone-flash ' + (scored ? 'g' : 'm');
  setTimeout(() => { flash.className = 'zone-flash'; }, 600);

  await wait(320);

  // popup
  const pop  = document.getElementById('resultPop');
  const rtxt = document.getElementById('resultText');
  pop.className = 'result-pop';

  let label, isGoal;
  if (who === 'YOU' || who === 'YOU_AUTO') {
    isGoal = scored;
    label  = scored ? 'GOAL!' : 'SAVED!';
  } else if (who === 'CPU_KEEPER') {
    isGoal = !scored; // scored=CPU scored, isGoal for display = you saved
    label  = scored ? 'GOAL!' : 'SAVED!';
    isGoal = !scored; // green if you saved (CPU missed)
  } else {
    isGoal = !scored; // CPU scored = bad for you in shooter mode
    label  = scored ? 'GOAL!' : 'SAVED!';
    isGoal = !scored;
  }

  rtxt.className = 'result-text ' + (label === 'GOAL!' ? 'goal' : 'miss');
  rtxt.textContent = label;
  pop.classList.add('show');

  // bottom message
  if (who === 'YOU')         setMsg(scored ? '⚽ You scored!' : '🧤 Keeper saved it!', '');
  else if (who === 'CPU')    setMsg(scored ? '😬 CPU scored…' : '✅ CPU shot missed!', '');
  else if (who === 'CPU_KEEPER') setMsg(scored ? '😬 CPU scored!' : '🧤 Great save!', '');
  else                       setMsg(scored ? '⚽ You scored!' : '🧤 CPU kept it out!', '');

  await wait(1900);
}

/* ── zone helpers ── */
function enableZonesAs(cls) {
  document.querySelectorAll('.zone').forEach(z => {
    z.classList.remove('disabled');
    z.classList.add(cls);
  });
}
function disableZones() {
  document.querySelectorAll('.zone').forEach(z => {
    z.className = 'zone disabled';
    z.onclick = null;
  });
}

/* ── UI helpers ── */
function setPhaseBadge(text, cls) {
  const b = document.getElementById('phaseBadge');
  b.textContent = text;
  b.className = 'phase-badge ' + cls;
}
function setMsg(main, sub) {
  document.getElementById('msg').textContent    = main;
  document.getElementById('subMsg').textContent = sub;
}

/* ── game over ── */
function showGameOver() {
  const y = state.youScore, c = state.cpuScore;
  let title, sub;
  if (y > c)      { title = 'YOU WIN! 🏆'; sub = 'Brilliant shootout!'; }
  else if (y < c) { title = 'YOU LOSE';    sub = 'Better luck next time.'; }
  else            { title = 'DRAW';        sub = 'What a game!'; }
  document.getElementById('goTitle').textContent = title;
  document.getElementById('goScore').textContent = `${y} — ${c}`;
  document.getElementById('goSub').textContent   = sub;
  goOver();
}

/* ── start ── */
goMenu();
</script>
